name: Update Profile README

on:
  schedule:
    - cron: '0 * * * *'  # Every hour
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Profile README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cicirello/user-statistician@v1
        with:
          username: varshinicb1
          token: ${{ secrets.GITHUB_TOKEN }}
          layout: DEFAULT
          include-wakatime: true
          include-activity: true
          include-contributor-stats: true
          include-trophies: true
          include-quote: true
          include-views: true
          include-visitor-map: true
          include-recent-activity: true
          include-repo-list: true
          include-top-languages: true
          include-streak: true
          include-github-stats: true
          theme: radical
          stat-boxes: true
          output-path: ReadMe.md
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ReadMe.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update profile README [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi