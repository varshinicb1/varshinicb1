name: Update Profile README

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    name: Update Profile README
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub stats badge
        id: stats
        shell: bash
        run: |
          USER="varshinicb1"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          USER_DATA=$(curl -s -H "Authorization: token $TOKEN" "https://api.github.com/users/$USER")
          REPOS_DATA=$(curl -s -H "Authorization: token $TOKEN" "https://api.github.com/users/$USER/repos?per_page=100")
          EVENTS=$(curl -s -H "Authorization: token $TOKEN" "https://api.github.com/users/$USER/events?per_page=10")

          PUBLIC_REPOS=$(echo "$USER_DATA" | jq -r '.public_repos')
          FOLLOWERS=$(echo "$USER_DATA" | jq -r '.followers')
          FOLLOWING=$(echo "$USER_DATA" | jq -r '.following')

          TOTAL_STARS=$(echo "$REPOS_DATA" | jq '[.[] | .stargazers_count] | add // 0')
          TOTAL_FORKS=$(echo "$REPOS_DATA" | jq '[.[] | .forks_count] | add // 0')
          TOTAL_COMMITS=$(curl -s -H "Authorization: token $TOKEN" "https://api.github.com/search/commits?q=author:$USER" | jq -r '.total_count // 0')

          RANK="C"
          if [ "$TOTAL_STARS" -ge 500 ]; then RANK="S"; RANK_COLOR="gold"
          elif [ "$TOTAL_STARS" -ge 200 ]; then RANK="A+"; RANK_COLOR="orange"
          elif [ "$TOTAL_STARS" -ge 100 ]; then RANK="A"; RANK_COLOR="green"
          elif [ "$TOTAL_STARS" -ge 50 ]; then RANK="A-"; RANK_COLOR="lime"
          elif [ "$TOTAL_STARS" -ge 20 ]; then RANK="B+"; RANK_COLOR="yellow"
          elif [ "$TOTAL_STARS" -ge 10 ]; then RANK="B"; RANK_COLOR="blue"
          elif [ "$TOTAL_STARS" -ge 5 ]; then RANK="B-"; RANK_COLOR="cyan"; fi

          echo "stars=$TOTAL_STARS" >> $GITHUB_OUTPUT
          echo "forks=$TOTAL_FORKS" >> $GITHUB_OUTPUT
          echo "repos=$PUBLIC_REPOS" >> $GITHUB_OUTPUT
          echo "followers=$FOLLOWERS" >> $GITHUB_OUTPUT
          echo "commits=$TOTAL_COMMITS" >> $GITHUB_OUTPUT
          echo "rank=$RANK" >> $GITHUB_OUTPUT
          echo "rank_color=$RANK_COLOR" >> $GITHUB_OUTPUT

          echo "recent_activity<<EOF" >> $GITHUB_OUTPUT
          echo "$EVENTS" | jq -r '.[:5] | .[] |
            if .type == "PushEvent" then "- Pushed \(.payload.size) commit(s) to [\(.repo.name)](https://github.com/\(.repo.name))"
            elif .type == "CreateEvent" then "- Created \(.payload.ref_type) \(.payload.ref // "") in [\(.repo.name)](https://github.com/\(.repo.name))"
            elif .type == "IssuesEvent" then if .payload.action == "opened" then "- Opened issue in [\(.repo.name)](https://github.com/\(.repo.name))" else "- Closed issue in [\(.repo.name)](https://github.com/\(.repo.name))" end
            elif .type == "PullRequestEvent" then if .payload.action == "opened" then "- Opened PR in [\(.repo.name)](https://github.com/\(.repo.name))" else "- Merged PR in [\(.repo.name)](https://github.com/\(.repo.name))" end
            elif .type == "WatchEvent" then "- Starred [\(.repo.name)](https://github.com/\(.repo.name))"
            elif .type == "ForkEvent" then "- Forked [\(.repo.name)](https://github.com/\(.repo.name))"
            elif .type == "ReleaseEvent" then "- Published release in [\(.repo.name)](https://github.com/\(.repo.name))"
            else "- \(.type) in [\(.repo.name)](https://github.com/\(.repo.name))"
            end' 2>/dev/null || echo "- No recent activity"
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Update README sections
        shell: bash
        env:
          STARS: ${{ steps.stats.outputs.stars }}
          FORKS: ${{ steps.stats.outputs.forks }}
          REPOS: ${{ steps.stats.outputs.repos }}
          FOLLOWERS: ${{ steps.stats.outputs.followers }}
          COMMITS: ${{ steps.stats.outputs.commits }}
          RANK: ${{ steps.stats.outputs.rank }}
          RANK_COLOR: ${{ steps.stats.outputs.rank_color }}
          RECENT: ${{ steps.stats.outputs.recent_activity }}
        run: |
          README="ReadMe.md"

          STATS_BLOCK="<!--START_SECTION:stats-->
<span align=\"center\">

| Metric | Value |
|--------|-------|
| Total Stars | $STARS |
| Total Forks | $FORKS |
| Public Repos | $REPOS |
| Followers | $FOLLOWERS |
| Total Commits | $COMMITS |
| Grade | $RANK |

</span>
<!--END_SECTION:stats-->"

          python3 -c "
import re
with open('$README', 'r') as f:
    content = f.read()

stats_marker = r'<!--START_SECTION:stats-->.*?<!--END_SECTION:stats-->'
content = re.sub(stats_marker, '$STATS_BLOCK', content, flags=re.DOTALL)

activity_marker = r'<!--START_SECTION:activity-->.*?<!--END_SECTION:activity-->'
new_activity = '<!--START_SECTION:activity-->\\n$RECENT\\n<!--END_SECTION:activity-->'
content = re.sub(activity_marker, new_activity, content, flags=re.DOTALL)

with open('$README', 'w') as f:
    f.write(content)
"

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ReadMe.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update profile stats [skip ci]"
            git push
          else
            echo "No changes to commit"
          fi
