name: Update Profile README

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats
        id: stats
        run: |
          U=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/users/varshinicb1)
          R=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/users/varshinicb1/repos?per_page=100)
          echo "stars=$(echo "$R" | jq '[.[] | .stargazers_count] | add // 0')" >> $GITHUB_OUTPUT
          echo "forks=$(echo "$R" | jq '[.[] | .forks_count] | add // 0')" >> $GITHUB_OUTPUT
          echo "repos=$(echo "$U" | jq -r '.public_repos')" >> $GITHUB_OUTPUT
          echo "followers=$(echo "$U" | jq -r '.followers')" >> $GITHUB_OUTPUT

      - name: Update stats in README
        env:
          STARS: ${{ steps.stats.outputs.stars }}
          FORKS: ${{ steps.stats.outputs.forks }}
          REPOS: ${{ steps.stats.outputs.repos }}
          FOLLOWERS: ${{ steps.stats.outputs.followers }}
        run: |
          sed -i "s/| Total Stars |.* |/| Total Stars | $STARS |/" ReadMe.md
          sed -i "s/| Total Forks |.* |/| Total Forks | $FORKS |/" ReadMe.md
          sed -i "s/| Public Repos |.* |/| Public Repos | $REPOS |/" ReadMe.md
          sed -i "s/| Followers |.* |/| Followers | $FOLLOWERS |/" ReadMe.md
          sed -i "s/| Total Commits |.* |/| Total Commits | $COMMITS |/" ReadMe.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ReadMe.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update profile stats [skip ci]"
            git push
          else
            echo "No changes"
          fi
