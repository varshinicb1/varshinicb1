name: Update Profile README

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch stats
        id: stats
        run: |
          U=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/users/varshinicb1)
          R=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" https://api.github.com/users/varshinicb1/repos?per_page=100)
          C=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "https://api.github.com/search/commits?q=author:varshinicb1")
          STARS=$(echo "$R" | jq '[.[] | .stargazers_count] | add // 0')
          FORKS=$(echo "$R" | jq '[.[] | .forks_count] | add // 0')
          REPS=$(echo "$U" | jq -r '.public_repos')
          FOLS=$(echo "$U" | jq -r '.followers')
          COMMITS=$(echo "$C" | jq -r '.total_count // 0')
          if [ "$STARS" -ge 500 ]; then RANK="S"
          elif [ "$STARS" -ge 200 ]; then RANK="A+"
          elif [ "$STARS" -ge 100 ]; then RANK="A"
          elif [ "$STARS" -ge 50 ]; then RANK="A-"
          elif [ "$STARS" -ge 20 ]; then RANK="B+"
          elif [ "$STARS" -ge 10 ]; then RANK="B"
          elif [ "$STARS" -ge 5 ]; then RANK="B-"
          else RANK="C"
          fi
          echo "stars=$STARS" >> $GITHUB_OUTPUT
          echo "forks=$FORKS" >> $GITHUB_OUTPUT
          echo "repos=$REPS" >> $GITHUB_OUTPUT
          echo "followers=$FOLS" >> $GITHUB_OUTPUT
          echo "commits=$COMMITS" >> $GITHUB_OUTPUT
          echo "rank=$RANK" >> $GITHUB_OUTPUT

      - name: Update stats in README
        env:
          STARS: ${{ steps.stats.outputs.stars }}
          FORKS: ${{ steps.stats.outputs.forks }}
          REPOS: ${{ steps.stats.outputs.repos }}
          FOLLOWERS: ${{ steps.stats.outputs.followers }}
          COMMITS: ${{ steps.stats.outputs.commits }}
          RANK: ${{ steps.stats.outputs.rank }}
        run: |
          sed -i "s/| Total Stars |.* |/| Total Stars | $STARS |/" ReadMe.md
          sed -i "s/| Total Forks |.* |/| Total Forks | $FORKS |/" ReadMe.md
          sed -i "s/| Public Repos |.* |/| Public Repos | $REPOS |/" ReadMe.md
          sed -i "s/| Followers |.* |/| Followers | $FOLLOWERS |/" ReadMe.md
          sed -i "s/| Total Commits |.* |/| Total Commits | $COMMITS |/" ReadMe.md
          sed -i "s/| Grade |.* |/| Grade | **$RANK** |/" ReadMe.md

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ReadMe.md
          if ! git diff --cached --quiet; then
            git commit -m "chore: update profile stats [skip ci]"
            git push
          else
            echo "No changes"
          fi
